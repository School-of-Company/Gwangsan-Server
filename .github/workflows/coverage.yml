name: Coverage

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: ["develop", "main"]

jobs:
  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Java 21
        uses: actions/setup-java@v3
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test

      - name: Download base coverage
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: ci.yml
          branch: ${{ github.base_ref }}
          name: coverage-report
          path: base-coverage
        continue-on-error: true

      - name: Compare coverage
        id: compare
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET
          import os

          def get_coverage(path):
              try:
                  tree = ET.parse(path)
                  root = tree.getroot()
                  for counter in root.findall('counter'):
                      if counter.get('type') == 'INSTRUCTION':
                          missed = int(counter.get('missed'))
                          covered = int(counter.get('covered'))
                          return round(covered / (missed + covered) * 100, 2)
              except Exception:
                  return None
              return None

          current = get_coverage('build/reports/jacoco/test/jacocoTestReport.xml')
          base_path = 'base-coverage/jacocoTestReport.xml'
          base = get_coverage(base_path) if os.path.exists(base_path) else None

          if base is not None:
              diff = round(current - base, 2)
              sign = '+' if diff >= 0 else ''
              emoji = '📈' if diff >= 0 else '📉'
              summary = f"{emoji} {base}% → {current}% ({sign}{diff}%)"
          else:
              summary = f"📊 {current}% (기준 데이터 없음)"

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"summary={summary}\n")
          EOF

      - name: Add coverage to PR
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: ${{ github.workspace }}/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "테스트 커버리지"
          min-coverage-overall: 60
          min-coverage-changed-files: 60
          update-comment: true

      - name: Comment coverage diff
        uses: actions/github-script@v7
        with:
          script: |
            const summary = '${{ steps.compare.outputs.summary }}';
            const marker = '<!-- coverage-diff -->';
            const body = `${marker}\n### 커버리지 변화\n${summary}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
