name: Coverage

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: ["develop", "main"]

jobs:
  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Java 21
        uses: actions/setup-java@v3
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test

      - name: Download base coverage
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: ci.yml
          branch: ${{ github.base_ref }}
          name: coverage-report
          path: base-coverage
        continue-on-error: true

      - name: Get changed Java files
        id: changed_files
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const files = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });
            const javaFiles = files.data
              .filter(f => f.filename.endsWith('.java') && f.status !== 'removed')
              .map(f => f.filename);
            return JSON.stringify(javaFiles);

      - name: Generate coverage report
        id: coverage
        env:
          CHANGED_FILES: ${{ steps.changed_files.outputs.result }}
        run: |
          python3 - <<'PYEOF'
          import xml.etree.ElementTree as ET
          import os
          import json

          MIN_COVERAGE = 60

          def get_overall(path):
              try:
                  root = ET.parse(path).getroot()
                  for counter in root.findall('counter'):
                      if counter.get('type') == 'INSTRUCTION':
                          missed = int(counter.get('missed'))
                          covered = int(counter.get('covered'))
                          total = missed + covered
                          return round(covered / total * 100, 2) if total else 0.0
              except Exception:
                  pass
              return None

          def get_file_cov(root, package_name, file_name):
              for pkg in root.findall('package'):
                  if pkg.get('name') == package_name:
                      for sf in pkg.findall('sourcefile'):
                          if sf.get('name') == file_name:
                              for counter in sf.findall('counter'):
                                  if counter.get('type') == 'INSTRUCTION':
                                      missed = int(counter.get('missed'))
                                      covered = int(counter.get('covered'))
                                      total = missed + covered
                                      return round(covered / total * 100, 2) if total else 0.0
              return None

          changed_files = json.loads(os.environ.get('CHANGED_FILES', '[]'))

          current_path = 'build/reports/jacoco/test/jacocoTestReport.xml'
          current_root = ET.parse(current_path).getroot()
          current_overall = get_overall(current_path)

          base_path = 'base-coverage/jacocoTestReport.xml'
          base_exists = os.path.exists(base_path)
          base_overall = get_overall(base_path) if base_exists else None
          base_root = ET.parse(base_path).getroot() if base_exists else None

          overall_ok = current_overall >= MIN_COVERAGE

          if base_overall is not None:
              diff = round(current_overall - base_overall, 2)
              sign = '+' if diff >= 0 else ''
              emoji = '📈' if diff >= 0 else '📉'
              overall_change = f"{emoji} {sign}{diff}%"
              base_str = f"{base_overall}%"
          else:
              overall_change = "📊 기준 없음"
              base_str = "-"

          lines = [
              "## 테스트 커버리지",
              "",
              f"| 항목 | 이전 | 현재 | 변화 | 상태 |",
              f"|------|------|------|------|:----:|",
              f"| 전체 | {base_str} | {current_overall}% | {overall_change} | {'✅' if overall_ok else '❌'} |",
          ]

          file_rows = []
          for filepath in changed_files:
              if 'src/main/java/' not in filepath or not filepath.endswith('.java'):
                  continue
              rel = filepath.split('src/main/java/')[1]
              parts = rel.rsplit('/', 1)
              if len(parts) != 2:
                  continue
              package_name, file_name = parts

              current_cov = get_file_cov(current_root, package_name, file_name)
              if current_cov is None:
                  continue

              if base_root:
                  base_cov = get_file_cov(base_root, package_name, file_name)
                  if base_cov is not None:
                      diff = round(current_cov - base_cov, 2)
                      sign = '+' if diff >= 0 else ''
                      emoji = '📈' if diff >= 0 else '📉'
                      change = f"{emoji} {sign}{diff}%"
                      f_base_str = f"{base_cov}%"
                  else:
                      change = "🆕 신규"
                      f_base_str = "-"
              else:
                  change = "📊 기준 없음"
                  f_base_str = "-"

              file_ok = current_cov >= MIN_COVERAGE
              file_rows.append(f"| `{file_name}` | {f_base_str} | {current_cov}% | {change} | {'✅' if file_ok else '❌'} |")

          if file_rows:
              lines += [
                  "",
                  "### 변경된 파일",
                  "| 파일 | 이전 | 현재 | 변화 | 상태 |",
                  "|------|------|------|------|:----:|",
              ] + file_rows

          body = "\n".join(lines)

          with open('coverage-body.md', 'w') as f:
              f.write(body)

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"overall_ok={'true' if overall_ok else 'false'}\n")
          PYEOF

      - name: Comment coverage
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- coverage-report -->';
            const content = fs.readFileSync('coverage-body.md', 'utf8');
            const body = `${marker}\n${content}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Check coverage threshold
        if: steps.coverage.outputs.overall_ok == 'false'
        run: |
          echo "Overall coverage is below 60%"
          exit 1
