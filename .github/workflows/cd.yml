name: CI/CD
on:
  push:
    branches: ["develop"]
 
env:
  DOCKERHUB_REPOSITORY: 2aew0n/gwangsan
  DISCORD_WEBHOOK_URL: https://discord.com/api/webhooks/1387943644601913365/sYVG9ylcYE6yFucoThqvz1l0pgwZylBfsGZhNU7NmCvStq4fB-GZ037bEDxCOSbfhMuH

jobs:
  ci-cd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: "21"
          distribution: "temurin"
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_ID }}
          aws-region: ap-northeast-2  #
      
      - name: Download Firebase service account from S3
        run: |
          mkdir -p src/main/resources
          aws s3 cp s3://gwangsan-githubaction/firebase-service-account.json src/main/resources/firebase-service-account.json
      
      - name: Build with Gradle
        run: ./gradlew clean build -x test
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build Docker image and push to Docker Hub
        env:
          IMAGE_TAG: latest
        run: |
          docker build -t ${{ env.DOCKERHUB_REPOSITORY }}:$IMAGE_TAG .
          docker push ${{ env.DOCKERHUB_REPOSITORY }}:$IMAGE_TAG
      
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: gsmsv-1.yujun.kr
          username: ubuntu
          password: ${{ secrets.SSH_PASSWORD }}
          port: 32659
          script: |
            docker pull ${{ env.DOCKERHUB_REPOSITORY }}:latest
            
            docker stop gwangsan-container || true
            docker rm gwangsan-container || true
            
            docker run -d \
              --name gwangsan-container \
              -p 8080:8080 \
              -e TZ=Asia/Seoul \
              --env-file .env \
              --net gwangsan-net \
              ${{ env.DOCKERHUB_REPOSITORY }}:latest
            
            docker system prune -f
      
      - name: ✅ Discord Notification - 배포 성공
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{"content": "✅ Docker image build, push and deployment succeeded!"}' \
               ${{ env.DISCORD_WEBHOOK_URL }}
      
      - name: ❌ Discord Notification - 배포 실패
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{"content": "❌ Docker image build, push or deployment failed."}' \
               ${{ env.DISCORD_WEBHOOK_URL }}


