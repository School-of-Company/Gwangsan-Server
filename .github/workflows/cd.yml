name: CD

on:
  push:
    branches: [ "develop", "main" ]

env:
  AWS_REGION: ap-northeast-2

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_ID }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download firebase-service-account.json from S3
        run: |
          mkdir -p src/main/resources
          aws s3 cp s3://gwangsan-githubaction/firebase-service-account.json src/main/resources/firebase-service-account.json

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with gradle
        run: ./gradlew build --no-daemon -x test

      - name: Build Docker image
        run: docker build -t gwangsan-app .

      - name: Setup SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Deploy to Private EC2 via Bastion
        run: |
          ssh -o StrictHostKeyChecking=no -o ProxyJump=ec2-user@${{ secrets.BASTION_IP }} \
              -i private_key.pem ec2-user@${{ secrets.PRIVATE_IP }} << 'EOF'
              cd /home/ec2-user/app || mkdir -p /home/ec2-user/app && cd /home/ec2-user/app

              echo "[+] Pulling latest source from GitHub (optional)"

              echo "[+] Stopping existing container (if any)..."
              docker stop gwangsan-container || true
              docker rm gwangsan-container || true
              docker rmi gwangsan-app || true

              echo "[+] Building Docker image..."
              docker build -t gwangsan-app .

              echo "[+] Running new container..."
              docker run -d --name gwangsan-container -p 8080:8080 --env-file .env gwangsan-app

              echo "✅ Deployment Done"
EOF
