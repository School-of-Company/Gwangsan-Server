name: CI/CD

on:
  push:
    branches: ["develop"]

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: gwangsan-app
  DISCORD_WEBHOOK_URL: https://discord.com/api/webhooks/1387943644601913365/sYVG9ylcYE6yFucoThqvz1l0pgwZylBfsGZhNU7NmCvStq4fB-GZ037bEDxCOSbfhMuH

jobs:
  ci-cd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_ID }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download Firebase service account from S3
        run: |
          mkdir -p src/main/resources
          aws s3 cp s3://gwangsan-githubaction/firebase-service-account.json src/main/resources/firebase-service-account.json

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image and push to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Create appspec and scripts
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          mkdir -p codedeploy/scripts

          cat > codedeploy/appspec.yml << EOF
          version: 0.0
          os: linux
          hooks:
            AfterInstall:
              - location: scripts/deploy.sh
                timeout: 180
                runas: root
          EOF

          cat > codedeploy/scripts/deploy.sh << EOF
          #!/bin/bash
          export PATH=\$PATH:/usr/local/bin:/usr/bin
          /usr/local/bin/aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin $ECR_REGISTRY

          docker pull $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          docker stop gwangsan-container || true
          docker rm gwangsan-container || true

          docker run -d \\
            --name gwangsan-container \\
            -p 8080:8080 \\
            -e TZ=Asia/Seoul \\
            --env-file /home/ubuntu/.env \\
            $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          docker system prune -f
          EOF

          chmod +x codedeploy/scripts/deploy.sh

      - name: Zip codedeploy bundle
        run: |
          cd codedeploy
          zip -r ../deploy.zip .

      - name: Upload to S3
        run: |
          aws s3 cp deploy.zip s3://gwangsan-githubaction/codedeploy/deploy.zip

      - name: Deploy via CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name gwangsan-app \
            --deployment-group-name gwangsan-deployment-group \
            --s3-location bucket=gwangsan-githubaction,key=codedeploy/deploy.zip,bundleType=zip \
            --region ${{ env.AWS_REGION }}

      - name: ✅ Discord Notification - 배포 성공
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{"content": "✅ ECR push and CodeDeploy deployment succeeded!"}' \
               ${{ env.DISCORD_WEBHOOK_URL }}

      - name: ❌ Discord Notification - 배포 실패
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{"content": "❌ ECR push or CodeDeploy deployment failed."}' \
               ${{ env.DISCORD_WEBHOOK_URL }}
