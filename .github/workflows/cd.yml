name: CI/CD
on:
  push:
    branches: ["Updata/171-change-auth"]
 
env:
  DOCKERHUB_REPOSITORY: 2aew0n/gwangsan
  DISCORD_WEBHOOK_URL: https://discord.com/api/webhooks/1387943644601913365/sYVG9ylcYE6yFucoThqvz1l0pgwZylBfsGZhNU7NmCvStq4fB-GZ037bEDxCOSbfhMuH

jobs:
  ci-cd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: "21"
          distribution: "temurin"
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Create Firebase service account file
        run: |
          mkdir -p src/main/resources
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > src/main/resources/firebase-service-account.json
      
      - name: Build with Gradle
        run: ./gradlew clean build -x test
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build Docker image and push to Docker Hub
        env:
          IMAGE_TAG: latest
        run: |
          docker build -t ${{ env.DOCKERHUB_REPOSITORY }}:$IMAGE_TAG .
          docker push ${{ env.DOCKERHUB_REPOSITORY }}:$IMAGE_TAG
      
      - name: ✅ Discord Notification - 배포 성공
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{"content": "✅ Docker image build and push succeeded!"}' \
               ${{ env.DISCORD_WEBHOOK_URL }}
      
      - name: ❌ Discord Notification - 배포 실패
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{"content": "❌ Docker image build and push failed."}' \
               ${{ env.DISCORD_WEBHOOK_URL }}
