name: CI/CD

on:
  push:
    branches: ["develop", "main"]
  pull_request:
    branches: ["*"]

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: gwangsan-ecr
  S3_BUCKET_NAME: gwangsan-githubaction
  CODE_DEPLOY_APPLICATION_NAME: gwangsan-deploy
  CODE_DEPLOY_DEPLOYMENT_GROUP_NAME: gwangsan-dg
  DISCORD_WEBHOOK_URL: https://discord.com/api/webhooks/1387943644601913365/sYVG9ylcYE6yFucoThqvz1l0pgwZylBfsGZhNU7NmCvStq4fB-GZ037bEDxCOSbfhMuH

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_ID }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download Firebase service account from S3
        run: |
          mkdir -p src/main/resources
          aws s3 cp s3://${{ env.S3_BUCKET_NAME }}/firebase-service-account.json src/main/resources/firebase-service-account.json

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build Docker image and push to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG .
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG

      - name: Zip AppSpec and deploy script
        run: |
          mkdir codedeploy
          cp appspec.yml codedeploy/
          cp scripts/deploy.sh codedeploy/
          zip -r codedeploy_bundle.zip codedeploy/

      - name: Upload CodeDeploy bundle to S3
        run: |
          aws s3 cp codedeploy_bundle.zip s3://${{ env.S3_BUCKET_NAME }}/codedeploy_bundle.zip

      - name: Trigger CodeDeploy deployment
        run: |
          aws deploy create-deployment \
            --application-name ${{ env.CODE_DEPLOY_APPLICATION_NAME }} \
            --deployment-group-name ${{ env.CODE_DEPLOY_DEPLOYMENT_GROUP_NAME }} \
            --s3-location bucket=${{ env.S3_BUCKET_NAME }},bundleType=zip,key=codedeploy_bundle.zip \
            --region ${{ env.AWS_REGION }}
      
      - name: ✅ Discord Notification - 배포 성공
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{
                 "content": "✅ **Deployment Succeeded**\n🔀 **Branch**: `${{ github.ref_name }}`\n🔢 **Commit**: [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})\n📦 **Repository**: `${{ github.repository }}`\n🌐 **Region**: `${{ env.AWS_REGION }}`"
               }' \
               ${{ env.DISCORD_WEBHOOK_URL }}

      - name: ❌ Discord Notification - 배포 실패
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{
                 "content": "❌ **Deployment Failed**\n🔀 **Branch**: `${{ github.ref_name }}`\n🔢 **Commit**: [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})\n📦 **Repository**: `${{ github.repository }}`\n🌐 **Region**: `${{ env.AWS_REGION }}`"
               }' \
               ${{ env.DISCORD_WEBHOOK_URL }}      
